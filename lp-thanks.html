<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込み完了 | 検査シートアプリ</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      color: #333;
      line-height: 1.8;
      background: #14252A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .thanks-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 36px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .thanks-icon {
      width: 72px; height: 72px;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #14252A;
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      color: #666;
      margin-bottom: 12px;
    }
    .thanks-note {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin: 24px 0;
      font-size: 14px;
      color: #555;
      line-height: 1.8;
    }
    .btn-back {
      display: inline-block;
      background: #14252A;
      color: #f59e0b;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-back:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="thanks-card">
    <div class="thanks-icon">&#x2713;</div>
    <h1>お申し込みありがとうございます</h1>
    <p>決済が正常に完了しました。</p>
    <div class="thanks-note">
      ログイン情報をご登録のメールアドレスにお送りします。<br>
      通常、数時間以内にお届けいたします。<br>
      しばらくお待ちください。
    </div>
    <p>メールが届かない場合は、迷惑メールフォルダをご確認いただくか、<br>お問い合わせください。</p>
    <a href="/lp.html" class="btn-back">トップページに戻る</a>
  </div>

</body>
</html>
